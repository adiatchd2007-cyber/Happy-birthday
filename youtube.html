<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YouTube Memories ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
        }

        nav {
            height: 65px;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 25px;
            font-weight: bold;
            color: red;
        }

        .search {
            width: 50%;
        }

        .search input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #121212;
            color: white;
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 220px;
            padding: 20px;
        }

        .sidebar div {
            margin: 20px 0;
            cursor: pointer;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .player {
            background: #181818;
            padding: 20px;
            border-radius: 20px;
        }

        video {
            width: auto;
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: auto;
            border-radius: 15px;
            object-fit: contain;
            background: black;
        }

        .title {
            margin-top: 15px;
            font-size: 25px;
        }

        .meta {
            margin-top: 10px;
            color: #aaa;
        }

        .subscribe {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: red;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .grid {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 15px;
        }

        .card h3 {
            margin-top: 10px;
        }

        .next {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #ff4081;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <nav>

        <div class="logo">
            ▶ DidiTube
        </div>

        <div class="search">
            <input placeholder="Search memories...">
        </div>

    </nav>

    <div class="container">

        <div class="sidebar">

            <div>🏠 Home</div>

            <div>🎬 Shorts</div>

            <div>❤️ Memories</div>

            <div>⭐ Favourite Moments</div>

            <div>🎂 Birthday Special</div>

        </div>

        <div class="main">

            <div class="player">

                <video id="videoPlayer" controls>

                    <sourcvideo1.mp4" type="video/mp4">

                </video>

                <div class="title" id="title">

                    Didi Through The Years ❤️

                </div>

                <div class="meta" id="meta">

                    1M memories • Uploaded forever ago

                </div>

                <button class="subscribe">

                    ❤️ Subscribe To Didi

                </button>

            </div>

            <div class="grid">

                <div class="card" onclick="loadVideo(
'video1.mp4',
'Didi Through The Years ❤️',
'1M memories • Uploaded forever ago'
)">

                    <img src="thumb1.jpg">

                    <h3>Best Memories❤️</h3>

                </div>

                <div class="card" onclick="loadVideo(
'video2.mp4',
'Best Memories Together ❤️',
'999K memories • Never forgotten'
)">

                    <img src="thumb2.jpg">

                    <h3>Rab se meri bas ik hi dua❤️</h3>

                </div>

                <div class="card" onclick="loadVideo(
'video3.mp4',
'Things I Never Said ❤️',
'Special Message'
)">

                    <img src="thumb3.jpg">

                    <h3> Always & forever❤️</h3>

                </div>

                <div class="card" onclick="loadVideo(
'video4.mp4',
'Birthday Surprise ❤️',
'Today'
)">

                    <img src="thumb4.jpg">

                    <h3>Made for eachother❤️ </h3>

                </div>

            </div>

            <a href="instagram.html" class="next">

                📸 Continue Journey

            </a>

        </div>

    </div>

    <script>

        function loadVideo(
            video,
            title,
            meta
        ) {

            document
                .getElementById("videoPlayer")
                .src = video;

            document
                .getElementById("title")
                .innerHTML = title;

            document
                .getElementById("meta")
                .innerHTML = meta;

            document
                .getElementById("videoPlayer")
                .play();

        }

    </script>

</body>

</html>
