<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didi Spotify ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif
        }

        body {
            background: #121212;
            color: #fff;
            overflow-x: hidden
        }

        .bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            transform: scale(1.1);
            opacity: .18;
            z-index: -1
        }

        .container {
            display: flex;
            min-height: 100vh
        }

        .sidebar {
            width: 240px;
            background: #000;
            padding: 25px
        }

        .sidebar h2 {
            margin-bottom: 25px
        }

        .sidebar a {
            display: block;
            color: #bbb;
            text-decoration: none;
            margin: 14px 0
        }

        .main {
            flex: 1;
            padding: 25px
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px
        }

        .card {
            background: #1b1b1b;
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            position: relative
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px
        }

        .like {
            position: absolute;
            top: 12px;
            right: 12px;
            border: none;
            background: none;
            font-size: 22px;
            cursor: pointer
        }

        .player {
            margin-top: 25px;
            background: #1b1b1b;
            padding: 20px;
            border-radius: 18px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap
        }

        .album {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden
        }

        .album img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: spin 10s linear infinite
        }

        @keyframes spin {
            from {
                transform: rotate(0)
            }

            to {
                transform: rotate(360deg)
            }
        }

        .info {
            flex: 1;
            min-width: 280px
        }

        audio {
            width: 100%;
            margin-top: 10px
        }

        .eq {
            display: flex;
            gap: 4px;
            height: 50px;
            align-items: flex-end;
            margin-top: 15px
        }

        .eq div {
            width: 8px;
            background: #1DB954;
            animation: b 1s infinite
        }

        .eq div:nth-child(2) {
            animation-delay: .2s
        }

        .eq div:nth-child(3) {
            animation-delay: .4s
        }

        .eq div:nth-child(4) {
            animation-delay: .6s
        }

        .eq div:nth-child(5) {
            animation-delay: .8s
        }

        @keyframes b {

            0%,
            100% {
                height: 10px
            }

            50% {
                height: 45px
            }
        }

        .lyrics,
        .rec {
            margin-top: 25px;
            background: #1b1b1b;
            padding: 20px;
            border-radius: 18px
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            background: #1DB954;
            color: #fff;
            padding: 14px 24px;
            border-radius: 30px;
            text-decoration: none
        }
    </style>
</head>

<body>

    <div class="bg" id="bg"></div>

    <div class="container">
        <div class="sidebar">
            <h2>🎵 Didi Spotify</h2>
            <a href="#">🏠 Home</a>
            <a href="#">❤️ For Didi</a>
            <a href="#">🎂 Birthday Mix</a>
            <a href="#">⭐ Memories</a>
            <a href="#">🎙️ Voice Notes</a>
        </div>

        <div class="main">
            <h1>Made Especially For Didi ❤️</h1><br>

            <div class="cards">
                <div class="card" onclick="loadSong('childhood')">
                    <button class="like" onclick="event.stopPropagation();toggleLike(this)">❤️</button>
                    <img src="didi1.jpg">
                    <h3>Childhood Memories</h3>
                </div>

                <div class="card" onclick="loadSong('birthday')">
                    <button class="like" onclick="event.stopPropagation();toggleLike(this)">❤️</button>
                    <img src="didi2.jpg">
                    <h3>Birthday Special</h3>
                </div>

                <div class="card" onclick="loadSong('thankyou')">
                    <button class="like" onclick="event.stopPropagation();toggleLike(this)">❤️</button>
                    <img src="didi3.jpg">
                    <h3>Thank You Didi</h3>
                </div>

                <div class="card" onclick="loadSong('favourite')">
                    <button class="like" onclick="event.stopPropagation();toggleLike(this)">❤️</button>
                    <img src="didi4.jpg">
                    <h3>Favourite Person</h3>
                </div>
            </div>

            <div class="player">
                <div class="album"><img id="cover" src="didi1.jpg"></div>
                <div class="info">
                    <h2 id="title">Childhood Memories</h2>
                    <audio id="audio" controls>
                        <source src="childhood.mp3" type="audio/mpeg">
                    </audio>

                    <div class="eq">
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
            </div>

            <div class="lyrics">
                <h2>💌 Message</h2><br>
                <p id="lyrics"></p>
            </div>

        

            <a class="btn" href="youtube.html">▶ Continue Journey</a>
        </div>
    </div>

    <script>
        const songs = {
            childhood: {
                title: "Childhood Memories",
                audio: "hum bhi agr bache.mp3",
                cover: "didi1.jpg",
                text: `Those carefree days...<br><br>
We may not have spent our entire childhood together,<br><br>
but I'm truly greatful for every memory we did make.<br><br>
Sometimes even a few moments become unforgettable,<br>
the memories will never fade.<br><br>
Thank you for being part of every beautiful chapter of my life❤️`
            },
            birthday: {
                title: "Birthday Special",
                audio: "happy birthday.mp3",
                cover: "didi2.jpg",
                text: `Today is your day...<br><br>
Today isn't just another day. <br>

It's the day someone truly wonderful
came into this world. <br><br>
Happy Birthday Didi 🎂❤️`
            },
            thankyou: {
                title: "Thank You Didi",
                audio: "tera mujhse.mp3",
                cover: "didi3.jpg",
                text: `Thank you for every lesson,
every sacrifice and every smile.<br><br>
You always stood beside me.<br><br>
Thank you for everything ❤️`
            },
            favourite: {
                title: "Favourite Person",
                audio: "tu hai to.mp3",
                cover: "didi4.jpg",
                text: `Some people make life better just by being in it.<br><br>
For me, that person has always been you.<br><br>
You will always be one of my favourite people ❤️`
            }
        };

        function loadSong(k) {
            const s = songs[k];
            document.getElementById('title').innerHTML = s.title;
            document.getElementById('cover').src = s.cover;
            document.getElementById('bg').style.backgroundImage = `url('${s.cover}')`;
            document.getElementById('lyrics').innerHTML = s.text;

            const a = document.getElementById('audio');
            a.src = s.audio;
            a.play();
        }
        function toggleLike(btn) { btn.textContent = btn.textContent === "❤️" ? "💚" : "❤️"; }
        loadSong('childhood');
    </script>
</body>

</html>
